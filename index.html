<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="file_type_css_icon_130661.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
    <title>Estrutura de Paginação</title>
</head>
<body>
    <h1>Estrutura de Paginação</h1>
    <ul>
        <li>
            <h2>Normal</h2>
            <ul class="pagination">
                <li class="box"><<</li>
                <li class="box">1</li>
                <li class="box">2</li> 
                <li class="box">3</li>
                <li class="box">>></li>
            </ul>
        </li>
        <li>
            <h2>Ao passar o mouse em cima</h2>
            <ul class="pagination">
                <li class="box item"><<</li>
                <li class="box item">1</li>
                <li class="box item">2</li>
                <li class="box item">3</li>
                <li class="box item">>></li>
            </ul>
        </li>
    </ul>
</body>
</html>
